# workspace navigation
bindsym $mod+1 workspace $ws1
bindsym $mod+2 workspace $ws2
bindsym $mod+3 workspace $ws3
bindsym $mod+4 workspace $ws4
bindsym $mod+5 workspace $ws5
bindsym $mod+6 workspace $ws6
bindsym $mod+7 workspace $ws7
bindsym $mod+8 workspace $ws8
bindsym $mod+9 workspace $ws9
bindsym $mod+0 workspace $ws10
bindsym $alt+1 workspace $ws11
bindcode $mod+49 workspace $ws7
bindsym $mod+Tab workspace next
bindsym $mod+$shift+Tab workspace prev

# move containers to workspace
bindsym $mod+$shift+1 move container to workspace $ws1
bindsym $mod+$shift+2 move container to workspace $ws2
bindsym $mod+$shift+3 move container to workspace $ws3
bindsym $mod+$shift+4 move container to workspace $ws4
bindsym $mod+$shift+5 move container to workspace $ws5
bindsym $mod+$shift+6 move container to workspace $ws6
bindsym $mod+$shift+7 move container to workspace $ws7
bindsym $mod+$shift+8 move container to workspace $ws8
bindsym $mod+$shift+9 move container to workspace $ws9
bindsym $mod+$shift+0 move container to workspace $ws10
bindsym $mod+$alt+1 move container to workspace $ws11

# window management
bindsym $mod+q kill
bindsym $mod+f fullscreen toggle
bindsym $mod+m split h
bindsym $mod+z split v
bindsym $mod+s layout stacking
bindsym $mod+g layout tabbed
bindsym $mod+r layout toggle split
bindsym $mod+$shift+space floating toggle
bindsym $mod+a focus parent
bindsym $mod+y focus mode_toggle
bindsym $mod+x [urgent=latest] focus
bindsym $mod+$shift+x exec --no-startup-id xkill
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right
bindsym $mod+$shift+Left move left
bindsym $mod+$shift+Down move down
bindsym $mod+$shift+Up move up
bindsym $mod+$shift+Right move right

# resize controls
bindsym $mod+Ctrl+Right resize shrink width 1 px or 1 ppt
bindsym $mod+Ctrl+Up resize grow height 1 px or 1 ppt
bindsym $mod+Ctrl+Down resize shrink height 1 px or 1 ppt
bindsym $mod+Ctrl+Left resize grow width 1 px or 1 ppt

# i3 control
bindsym $mod+$shift+percent reload
bindsym $mod+$shift+r restart

# applications
bindsym $mod+Return exec --no-startup-id kitty zsh -c "tmux new -A -s daily"
bindsym $mod+$shift+Return exec --no-startup-id ghostty -e tmux new-session -A -s daily
bindsym $mod+t exec --no-startup-id kitty --working-directory=~ -e zsh
bindsym $mod+e exec --no-startup-id /usr/bin/thunar
bindsym $mod+b exec --no-startup-id /usr/bin/brave-origin-nightly
bindsym $mod+v exec --no-startup-id copyq show
bindsym $mod+d exec --no-startup-id dmenu_run -fn "JetBrainsMono NF:size=15" -p "search app ➜ " -nb "#282a36" -nf "#c3c3c0" -sb "#282a36" -sf "#50fa7b"
bindsym $mod+space exec --no-startup-id "rofi -show combi -modi window,drun,combi -combi-modi window,drun -config ~/.config/rofi/rofidmenu.rasi -matching fuzzy"
bindsym $mod+semicolon exec --no-startup-id rofimoji --selector rofi --selector-args "-theme ~/.config/rofi/emoji.rasi" --action type copy
bindsym $mod+$shift+c exec --no-startup-id xcolor -s clipboard && notify-send 'Color Picked!'
bindsym $mod+o exec --no-startup-id obsidian
bindsym $mod+$shift+a exec --no-startup-id ~/.local/share/scripts/emulator-launcher
bindsym $mod+$shift+b exec --no-startup-id polybar-msg cmd toggle

# shortcuts
bindsym $mod+h exec kitty --class "shortcut" --title "Shortcut: htop" zsh -c "htop"
bindsym $mod+n exec kitty --class "shortcut" --title "Shortcut: notes" zsh -c "nvim ~/personal/notes.md"
bindsym $mod+$shift+o exec kitty --class "opencode-vm" --title "Shortcut: OpenCode VM" -e bash -c "cd /home/triplea/labs/workspace/opencode-vm && vagrant up && vagrant ssh"

# screenshots and tools
bindsym $mod+F10 exec --no-startup-id flameshot gui
bindsym $mod+$shift+s exec --no-startup-id flameshot gui -c

# system controls
bindsym $mod+l exec --no-startup-id ~/.config/i3/scripts/lockscreen
bindsym $mod+$shift+e exec --no-startup-id ~/.config/i3/scripts/powermenu
bindsym $mod+$shift+w exec --no-startup-id ~/.config/i3/scripts/empty-workspace
bindsym $mod+$shift+n exec --no-startup-id networkmanager_dmenu

# media keys
bindsym XF86AudioMicMute exec amixer sset Capture toggle
bindsym XF86AudioPlay exec --no-startup-id playerctl play-pause
bindsym XF86AudioNext exec --no-startup-id playerctl next
bindsym XF86AudioPrev exec --no-startup-id playerctl previous
bindsym XF86AudioMute exec --no-startup-id ~/.config/i3/scripts/volume mute
bindsym XF86AudioRaiseVolume exec --no-startup-id ~/.config/i3/scripts/volume up
bindsym XF86AudioLowerVolume exec --no-startup-id ~/.config/i3/scripts/volume down
bindsym $mod+XF86AudioRaiseVolume exec --no-startup-id amixer -D pulse sset Master 1%+ && pkill -RTMIN+1 i3blocks
bindsym $mod+XF86AudioLowerVolume exec --no-startup-id amixer -D pulse sset Master 1%- && pkill -RTMIN+1 i3blocks
bindsym $mod+F12 exec --no-startup-id ~/.local/share/scripts/audio-manager toggle

# brightness controls
bindsym XF86MonBrightnessDown exec --no-startup-id ~/.config/i3/scripts/brightness down
bindsym XF86MonBrightnessUp exec --no-startup-id ~/.config/i3/scripts/brightness up

# modes
bindsym $mod+u mode "utilities"
mode "utilities" {
    bindsym f exec --no-startup-id wal -s -i ~/Pictures/wallpapers/favourites
    bindsym c exec --no-startup-id mate-calculator
    bindsym Escape mode "default"
    bindsym Return mode "default"
}

bindsym $alt+r mode "resize"
mode "resize" {
    bindsym Left resize shrink width 5 px or 5 ppt
    bindsym Down resize grow height 5 px or 5 ppt
    bindsym Up resize shrink height 5 px or 5 ppt
    bindsym Right resize grow width 5 px or 5 ppt
    bindsym Return mode "default"
    bindsym Escape mode "default"
}
